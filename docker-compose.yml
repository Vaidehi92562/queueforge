services:
  postgres:
    image: postgres:16-alpine
    container_name: queueforge-postgres
    environment:
      POSTGRES_DB: queueforge
      POSTGRES_USER: queueforge
      POSTGRES_PASSWORD: queueforge
    ports:
      - "5432:5432"
    volumes:
      - queueforge_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U queueforge -d queueforge"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  queueforge_postgres_data:
