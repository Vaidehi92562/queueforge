server:
  port: 8080

spring:
  application:
    name: queueforge-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/queueforge}
    username: ${DB_USERNAME:queueforge}
    password: ${DB_PASSWORD:queueforge}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: ${JWT_SECRET:queueforge-super-secure-development-secret-key-change-in-production}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

queueforge:
  worker:
    heartbeat-interval-seconds: 10
    stale-threshold-seconds: 30
    default-concurrency: 5
    poll-interval-ms: 2000

  scheduler:
    scan-interval-ms: 5000

  jobs:
    default-max-attempts: 3
    default-priority: 5

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.queueforge: DEBUG
    org.springframework.security: INFO
